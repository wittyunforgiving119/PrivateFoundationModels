name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      # mlx-swift-lm (transitive dep via PrivateFoundationModelsMLX)
      # requires swift-tools-version 6.1, which ships in Xcode 16.4+.
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Swift version
        run: swift --version

      - name: Resolve packages
        run: swift package resolve

      - name: Build (debug)
        run: swift build

      - name: Test
        run: swift test --parallel

      - name: Build (release)
        run: swift build -c release
