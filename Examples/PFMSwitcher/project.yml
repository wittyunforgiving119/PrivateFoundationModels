name: PFMSwitcher
options:
  bundleIdPrefix: dev.pebble
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "18.0"
  groupSortPosition: top
settings:
  base:
    DEVELOPMENT_LANGUAGE: en
    SWIFT_VERSION: "6.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
packages:
  PrivateFoundationModels:
    path: ../..
targets:
  PFMSwitcher:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: PFMSwitcher
    dependencies:
      - package: PrivateFoundationModels
        product: PrivateFoundationModels
      - package: PrivateFoundationModels
        product: PrivateFoundationModelsCoreML
    info:
      path: PFMSwitcher/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: "Default Configuration"
                UISceneDelegateClassName: ""
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.pebble.PFMSwitcher
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_EMIT_LOC_STRINGS: YES
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        ENABLE_PREVIEWS: YES
